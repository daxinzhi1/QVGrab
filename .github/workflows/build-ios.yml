name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install CocoaPods (if needed)
        run: |
          sudo gem install cocoapods || true
          pod install || true

      - name: Build Archive
        run: |
          xcodebuild \
            -scheme QVGrab \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/QVGrab.xcarchive \
            archive

      - name: Export IPA
        run: |
          mkdir -p build/ipa

          xcodebuild -exportArchive \
            -archivePath build/QVGrab.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: QVGrab-IPA
          path: build/ipa