- name: Build IPA
  run: |
    cd QVGrab || exit 1

    echo "=== FULL STRUCTURE ==="
    find . -maxdepth 5 -name "*.xcworkspace"
    find . -maxdepth 5 -name "*.xcodeproj"

    WORKSPACE=$(find . -maxdepth 5 -name "*.xcworkspace" | head -n 1)
    PROJECT=$(find . -maxdepth 5 -name "*.xcodeproj" | head -n 1)

    echo "Workspace: $WORKSPACE"
    echo "Project: $PROJECT"

    # ❗ 强制检查
    if [ -z "$WORKSPACE" ] && [ -z "$PROJECT" ]; then
      echo "❌ ERROR: No Xcode project found"
      exit 1
    fi

    if [ -n "$WORKSPACE" ]; then
      echo "Using workspace build"

      xcodebuild archive \
        -workspace "$WORKSPACE" \
        -scheme QVGrab \
        -sdk iphoneos \
        CODE_SIGNING_ALLOWED=NO \
        -archivePath build/app.xcarchive
    else
      echo "Using project build"

      xcodebuild archive \
        -project "$PROJECT" \
        -scheme QVGrab \
        -sdk iphoneos \
        CODE_SIGNING_ALLOWED=NO \
        -archivePath build/app.xcarchive
    fi