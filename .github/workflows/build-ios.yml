- name: Checkout
  uses: actions/checkout@v4

- name: Show structure (debug)
  run: |
    pwd
    ls -lah
    find . -maxdepth 3 -type f | head -200

- name: Install Pods
  run: |
    pod install --repo-update

- name: Find workspace or project
  run: |
    find . -name "*.xcworkspace"
    find . -name "*.xcodeproj"

- name: Build
  run: |
    WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
    PROJECT=$(find . -name "*.xcodeproj" | head -n 1)

    if [ -n "$WORKSPACE" ]; then
      xcodebuild archive \
        -workspace "$WORKSPACE" \
        -scheme QVGrab \
        -sdk iphoneos \
        CODE_SIGNING_ALLOWED=NO
    else
      xcodebuild archive \
        -project "$PROJECT" \
        -scheme QVGrab \
        -sdk iphoneos \
        CODE_SIGNING_ALLOWED=NO
    fi